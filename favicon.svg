<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dfc9a0"/>
      <stop offset="100%" stop-color="#a6894e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  <!-- Outer hexagon -->
  <polygon points="32,6 54,17 54,47 32,58 10,47 10,17" fill="none" stroke="url(#g)" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Inner hexagon glow -->
  <polygon points="32,12 48,21 48,43 32,52 16,43 16,21" fill="rgba(200,169,110,.06)" stroke="rgba(200,169,110,.12)" stroke-width=".6" stroke-linejoin="round"/>
  <!-- Clock circle -->
  <circle cx="32" cy="32" r="11" fill="none" stroke="rgba(200,169,110,.35)" stroke-width="1"/>
  <!-- Hour markers -->
  <line x1="32" y1="22" x2="32" y2="24" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="42" y1="32" x2="40" y2="32" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="32" y1="42" x2="32" y2="40" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22" y1="32" x2="24" y2="32" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Hour hand (10h10 position - pointing upper-left) -->
  <line x1="32" y1="32" x2="32" y2="23" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Minute hand (pointing to 2 o'clock) -->
  <line x1="32" y1="32" x2="39.5" y2="27" stroke="#c8a96e" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="1.8" fill="#c8a96e"/>
</svg>
