<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Page introuvable — ONTIME TRANSFERT</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#c8a96e;--gold-light:#dfc9a0;--gold-dark:#a6894e;--black:#0a0a0a;--text:#e8e8e8;--text-muted:#777;--border:rgba(200,169,110,.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;}
.code{font-family:'Playfair Display',serif;font-size:clamp(100px,20vw,180px);color:var(--gold);line-height:1;margin-bottom:8px;opacity:.9;}
h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.4rem;font-weight:600;margin-bottom:12px;letter-spacing:.5px;}
p{color:var(--text-muted);font-size:.95rem;max-width:420px;line-height:1.6;margin-bottom:40px;}
.btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.btn{display:inline-block;padding:14px 32px;border-radius:8px;font-size:.9rem;font-weight:600;text-decoration:none;letter-spacing:.5px;transition:transform .2s,box-shadow .2s;}
.btn:hover{transform:translateY(-2px);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--black);}
.btn-gold:hover{box-shadow:0 8px 30px rgba(200,169,110,.3);}
.btn-outline{border:1px solid var(--border);color:var(--gold);}
.btn-outline:hover{border-color:var(--gold);box-shadow:0 8px 30px rgba(200,169,110,.1);}
.footer{position:absolute;bottom:24px;font-size:.75rem;color:var(--text-muted);letter-spacing:1px;}
</style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page introuvable</h1>
  <p>La page que vous cherchez n'existe pas ou a été déplacée.</p>
  <div class="btns">
    <a href="index.html" class="btn btn-gold">Retour à l'accueil</a>
    <a href="reservation.html" class="btn btn-outline">Réserver un transfert</a>
  </div>
  <div class="footer">ONTIME TRANSFERT — VTC Premium Paris</div>
</body>
</html>
